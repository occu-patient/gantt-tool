<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職場健康服務計畫</title>

<style>
:root{
  --main:#2c4a62;
  --bg:#eef3f7;
}

/* ===== 基本 ===== */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:var(--bg);
}

/* ===== TOPBAR ===== */
.topbar{
  background:var(--main);
  color:#fff;
  padding:10px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.yr-num{
  font-weight:bold;
  font-size:18px;
  min-width:60px;
  text-align:center;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#fff;
  cursor:pointer;
  font-size:14px;
}

/* ===== LAYOUT ===== */
.main{
  display:flex;
  height:calc(100vh - 60px);
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  background:#fff;
  border-right:1px solid #ccc;
  overflow:auto;
  transition:.3s;
}

.pitem{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.pitem:hover{
  background:#f0f7ff;
}

/* ===== CONTENT ===== */
.content{
  flex:1;
  padding:15px;
  overflow:auto;
}

/* ===== 手機模式 ===== */
.menu-btn{
  display:none;
}

@media(max-width:768px){

  .menu-btn{
    display:block;
  }

  .sidebar{
    position:fixed;
    left:-260px;
    top:0;
    bottom:0;
    z-index:1000;
  }

  .sidebar.open{
    left:0;
  }

  .main{
    height:auto;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div>📊 健康計畫</div>

  <button onclick="chgYear(-1)">◀</button>
  <div id="yrNum" class="yr-num"></div>
  <button onclick="chgYear(1)">▶</button>

  <button onclick="newProj()">＋專案</button>
  <button onclick="cloneProj()">📋複製</button>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <h2>內容區</h2>
    <p>支援手機滑動 / 電腦操作</p>
  </div>
</div>

<script>
// ===== 基本 =====
const STORAGE_KEY = 'gantt_v2';
const CURRENT_YEAR = new Date().getFullYear();

let projects = [];
let currentProjectId = null;

// ===== 初始化 =====
init();

function init(){
  document.getElementById('yrNum').innerText = CURRENT_YEAR;
  loadProjects();
  renderSidebar();
}

// ===== Sidebar =====
function renderSidebar(){
  const el = document.getElementById('sidebar');

  el.innerHTML = projects.map(p=>`
    <div class="pitem" onclick="selectProj(${p.id})">
      <div><b>${p.name}</b></div>
      <div style="font-size:12px;color:#666;">${p.year}</div>
    </div>
  `).join('');
}

// ===== 手機選單 =====
function toggleMenu(){
  document.getElementById('sidebar').classList.toggle('open');
}

// ===== 年度 =====
function chgYear(step){
  let y = parseInt(document.getElementById('yrNum').innerText);
  let newY = y + step;

  if(newY < 2020 || newY > CURRENT_YEAR + 1){
    alert("年度錯誤");
    return;
  }

  document.getElementById('yrNum').innerText = newY;
}

// ===== 專案 =====
function newProj(){
  const name = prompt("專案名稱");
  if(!name) return;

  const p = {
    id: Date.now(),
    name,
    year: CURRENT_YEAR
  };

  projects.push(p);
  currentProjectId = p.id;

  saveProjects();
  renderSidebar();
}

function cloneProj(){
  const p = projects.find(x=>x.id===currentProjectId);
  if(!p) return;

  const clone = {
    ...structuredClone(p),
    id: Date.now(),
    name: p.name + "（複製）"
  };

  projects.push(clone);
  currentProjectId = clone.id;

  saveProjects();
  renderSidebar();
}

function selectProj(id){
  currentProjectId = id;

  // 手機點選後關閉 sidebar
  if(window.innerWidth < 768){
    document.getElementById('sidebar').classList.remove('open');
  }
}

// ===== storage =====
function saveProjects(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}

function loadProjects(){
  const d = localStorage.getItem(STORAGE_KEY);
  if(d) projects = JSON.parse(d);
}
</script>

</body>
</html>
