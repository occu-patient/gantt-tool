<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職場健康服務年度計畫甘特圖</title>
<style>
/* 基礎樣式與原本相同，僅保留核心定義 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sw:295px;
  --acc:#3d6e94;--acc2:#2c5070;--accl:#dcedf7;
  --hbg:#2c4a62;--sbg:#3d6e94;
  --bdr:#c0d0da;--text:#1a2b38;--muted:#5a7080;
  --done:#27ae60;
}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:13px;color:var(--text);background:#eaf0f5;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
.topbar{background:var(--hbg);color:#fff;padding:8px 14px;display:flex;align-items:center;gap:9px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.tb-title{font-size:13.5px;font-weight:700;flex:1;}
.yr-wrap{display:flex;align-items:center;gap:5px;}
.yr-btn{width:24px;height:24px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:4px;color:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.yr-num{font-size:16px;font-weight:700;min-width:48px;text-align:center;}
.tb-btn{padding:5px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;white-space:nowrap;}
.tb-btn:hover{background:rgba(255,255,255,.22);}
.tb-btn.prim{background:rgba(255,255,255,.88);color:var(--hbg);}
.tb-btn.prim:hover{background:#fff;}
.tb-btn.danger{background:rgba(220,60,60,.25);border-color:rgba(255,120,120,.5);}

/* PROJECT SELECTOR */
.proj-sep{width:1px;height:22px;background:rgba(255,255,255,.2);flex-shrink:0;}
.proj-select{padding:4px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);color:#fff;font-family:inherit;font-size:11px;cursor:pointer;max-width:160px;outline:none;}
.proj-select option{background:#2c4a62;color:#fff;}

/* LAYOUT & SIDEBAR (同前版本) */
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sw);min-width:var(--sw);background:#fff;border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;}
.sb-hdr{padding:8px 12px;border-bottom:1px solid var(--bdr);background:#f3f7fa;display:flex;align-items:center;gap:7px;}
.sb-scroll{flex:1;overflow-y:auto;}
.pitem{display:flex;align-items:flex-start;padding:6px 11px;gap:7px;cursor:pointer;border-bottom:1px solid #eff3f7;}
.pitem.active{background:#e6f2fb;}

/* GANTT AREA */
.g-wrap-outer{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.gantt-wrap{flex:1;overflow:auto;background:#fff;}
table.gt{border-collapse:collapse;table-layout:fixed;}
table.gt th,table.gt td{border:1px solid var(--bdr);vertical-align:middle;padding:0;}
.th1{background:var(--hbg);color:#fff;font-size:9.5px;font-weight:700;text-align:center;padding:6px 3px;}
.th2{background:var(--sbg);color:#fff;font-size:9px;font-weight:500;text-align:center;padding:4px 2px;}

/* 彈窗與 Footer 樣式 */
.modal-bg, .disc-bg, .rename-bg, .law-bg {display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:8000;align-items:center;justify-content:center;}
.open {display:flex !important;}
.rename-card, .disc-card, .modal {background:#fff;border-radius:10px;padding:22px 24px;box-shadow:0 16px 50px rgba(0,0,0,.2);}
.site-footer{flex-shrink:0;background:var(--hbg);color:rgba(255,255,255,.55);font-size:10px;text-align:center;padding:5px 16px;}
.site-footer a{color:rgba(255,255,255,.75);text-decoration:none;}
.mc.on, .pck.on {background:var(--acc);color:#fff;}
.mo-plan{position:absolute;top:4px;height:11px;border-radius:2px;}
.mo-done{position:absolute;bottom:4px;height:11px;border-radius:2px;background:var(--done);}

@media print {
    .topbar, .sidebar, .bar-legend, .sf-btn, .site-footer {display:none !important;}
}
</style>
</head>
<body>

<div class="print-hdr" id="printHdr">
  <div class="print-hdr-t" id="printT">職場健康服務年度計畫甘特圖</div>
  <div class="print-hdr-s" id="printS"></div>
</div>

<div class="topbar">
  <div class="tb-title">
    <span id="mainTitle" contenteditable="true" spellcheck="false" title="點擊編輯標題">職場健康服務年度計畫甘特圖</span>
  </div>
  <div class="yr-wrap">
    <button class="yr-btn" onclick="chgYear(-1)">◀</button>
    <div class="yr-num" id="yrNum"></div>
    <button class="yr-btn" onclick="chgYear(1)">▶</button>
  </div>
  <div class="proj-sep"></div>
  <select class="proj-select" id="projSelect" onchange="switchProj(this.value)" title="切換專案"></select>
  <button class="tb-btn" onclick="newProj()" title="建立新專案">＋ 新專案</button>
  <button class="tb-btn" onclick="copyProj()" title="複製當前專案內容並建立新專案">👯 複製</button>
  <button class="tb-btn danger" onclick="deleteProj()" title="刪除當前專案">🗑 刪除</button>
  <div class="proj-sep"></div>
  <button class="tb-btn" onclick="exportPDF()" id="pdfBtn">📄 匯出 PDF</button>
  <button class="tb-btn prim" onclick="genGantt()">🗓 產生甘特圖</button>
  <button class="tb-btn" onclick="openModal()">＋ 新增</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-hdr">
      <div class="sb-hdr-t" id="sidebarTitle" contenteditable="true">計畫清單</div>
      <div class="sel-all" onclick="togAll()">全選/取消</div>
    </div>
    <div class="sb-scroll" id="sbList"></div>
    <div class="sb-footer">
      <button class="sf-btn gen" onclick="genGantt()">✓ 產生甘特圖</button>
    </div>
  </div>
  <div class="g-wrap-outer">
    <div class="bar-legend" style="padding:5px 12px; font-size:10px; color:#666; background:#f8fafc; border-bottom:1px solid #ddd;">
      <span>圖例：</span>
      <span style="display:inline-block;width:20px;height:10px;background:var(--acc);opacity:0.5;border-radius:2px;"></span> 預定進度
      <span style="display:inline-block;width:20px;height:10px;background:var(--done);border-radius:2px;margin-left:10px;"></span> 已完成
    </div>
    <div class="gantt-wrap" id="ganttWrap">
      <div class="empty-g" style="text-align:center; padding-top:50px; color:#999;">勾選左側計畫後點擊產生甘特圖</div>
    </div>
  </div>
</div>

<footer class="site-footer">
  僅供個人及學術交流使用，嚴禁商業營利 · 商業授權請洽：<a href="https://www.instagram.com/occu.patient/" target="_blank">@occu.patient</a>
</footer>

<div class="disc-bg" id="discBg">
  <div class="disc-card">
    <div style="font-weight:bold; color:#c0392b; margin-bottom:10px;">⚠️ 使用者同意條款</div>
    <div style="font-size:12px; line-height:1.6; margin-bottom:20px; color:#444;">
      本工具採本地儲存，資料僅存於您的瀏覽器。請勿輸入敏感個資。<br>
      本工具僅供行政輔助，不具法律效力。嚴禁商業營利使用。
    </div>
    <div style="display:flex; gap:10px;">
        <button onclick="discDecline()" style="flex:1; padding:8px; cursor:pointer;">不同意</button>
        <button onclick="discAgree()" style="flex:2; padding:8px; background:var(--hbg); color:#fff; border:none; border-radius:4px; cursor:pointer;">✓ 同意進入</button>
    </div>
  </div>
</div>

<script>
// ═══════════ 資料與狀態 ═══════════
const COLORS=[{bg:'#3d7aa0'},{bg:'#3e8265'},{bg:'#b04a28'},{bg:'#7a5aa0'},{bg:'#a06820'},{bg:'#5a7080'},{bg:'#2a8888'},{bg:'#984070'}];
const CAT_CLR={'健康管理':'#2a6a50','行政管理':'#2c5878','健康促進':'#6a4a18','其他':'#4a6070'};

// 預設年度：動態獲取當年年度
const THIS_YEAR = new Date().getFullYear();

let _store = (function(){
    let store = JSON.parse(localStorage.getItem('gp_all'));
    if(!store){
        store = {
            currentProj: "預設專案",
            projects: {
                "預設專案": { year: THIS_YEAR, items: [], nid: 1 }
            }
        };
    }
    return store;
})();

let curProjName = _store.currentProj;
let projects = _store.projects[curProjName].items || [];
let nid = _store.projects[curProjName].nid || 1;
let curYear = _store.projects[curProjName].year || THIS_YEAR;
let editId=null, ppState=null, selMonths=[], selPers=[], selColor=0, selLawIds=[];

function save() {
    _store.projects[curProjName] = { year: curYear, items: projects, nid: nid };
    _store.currentProj = curProjName;
    localStorage.setItem('gp_all', JSON.stringify(_store));
}

// ═══════════ 專案管理 ═══════════
function renderProjSelect() {
    const sel = document.getElementById('projSelect');
    sel.innerHTML = Object.keys(_store.projects).map(n => 
        `<option value="${n}" ${n === curProjName ? 'selected' : ''}>${n}</option>`
    ).join('');
}

function switchProj(name) {
    save();
    curProjName = name;
    projects = _store.projects[name].items;
    nid = _store.projects[name].nid;
    curYear = _store.projects[name].year || THIS_YEAR;
    document.getElementById('yrNum').textContent = curYear;
    renderSB();
    genGantt();
    save();
}

function newProj() {
    const name = prompt("請輸入新專案名稱：", "專案 " + (Object.keys(_store.projects).length + 1));
    if(!name || !name.trim()) return;
    if(_store.projects[name.trim()]){ alert("專案已存在"); return; }
    _store.projects[name.trim()] = { year: THIS_YEAR, items: [], nid: 1 };
    switchProj(name.trim());
}

// 複製當前專案
function copyProj() {
    const name = prompt("請輸入複製後的專案名稱：", curProjName + " (副本)");
    if(!name || !name.trim()) return;
    if(_store.projects[name.trim()]){ alert("專案已存在"); return; }
    
    // 深拷貝當前資料
    const copiedData = JSON.parse(JSON.stringify(_store.projects[curProjName]));
    _store.projects[name.trim()] = copiedData;
    switchProj(name.trim());
}

function deleteProj() {
    if(Object.keys(_store.projects).length <= 1) return alert("至少需保留一個專案");
    if(!confirm("確定刪除此專案？")) return;
    delete _store.projects[curProjName];
    switchProj(Object.keys(_store.projects)[0]);
}

// ═══════════ 甘特圖生成 ═══════════
function genGantt() {
    const sel = projects.filter(p => p.checked);
    const wrap = document.getElementById('ganttWrap');
    if(!sel.length){ wrap.innerHTML = '<div style="padding:50px;text-align:center;color:#999;">請勾選計畫</div>'; return; }

    let h = `<table class="gt" style="width:100%; min-width:1100px;">
        <thead>
            <tr>
                <th class="th1" rowspan="2">計畫項目</th>
                <th class="th1" rowspan="2">說明</th>
                <th class="th1" colspan="12">${curYear} 年度</th>
            </tr>
            <tr>
                ${Array.from({length:12}, (_,i)=>`<th class="th2">${i+1}月</th>`).join('')}
            </tr>
        </thead>
        <tbody>`;
    
    sel.forEach(p => {
        h += `<tr>
            <td style="font-size:11px; padding:5px; font-weight:bold;">${p.name}</td>
            <td style="font-size:10px; padding:5px; color:#666;">${p.method || ''}</td>
            ${Array.from({length:12}, (_, i) => {
                const mo = i + 1;
                const has = p.months.includes(mo);
                const pg = p.prog && p.prog[mo] ? p.prog[mo] : {plan:100, done:false};
                return `<td class="cd-month" style="text-align:center;">
                    ${has ? `<div class="mo-plan" style="width:${pg.plan}%; background:${COLORS[p.color].bg}; opacity:0.5; left:0; top:5px; height:10px;"></div>` : ''}
                    ${pg.done ? `<div style="position:absolute; bottom:5px; left:0; right:0; height:10px; background:#27ae60;"></div>` : ''}
                </td>`;
            }).join('')}
        </tr>`;
    });
    h += '</tbody></table>';
    wrap.innerHTML = h;
}

// ═══════════ PDF 匯出優化 ═══════════
async function exportPDF(){
    const btn = document.getElementById('pdfBtn');
    btn.textContent = '⏳ 處理中...';
    btn.disabled = true;

    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');

    try {
        const table = document.querySelector('.gt');
        const A4W = 1122;
        const container = document.createElement('div');
        container.style.cssText = `position:fixed; left:-9999px; top:0; width:${A4W}px; background:#fff; padding:20px; font-family:sans-serif;`;

        // 標題 (移除年度顯示)
        const titleText = document.getElementById('mainTitle').textContent.trim();
        const hdr = document.createElement('div');
        hdr.style.cssText = 'text-align:center; padding-bottom:10px; border-bottom:2px solid #2c4a62; margin-bottom:15px;';
        hdr.innerHTML = `<div style="font-size:20px; font-weight:bold; color:#2c4a62;">${titleText}</div>
                         <div style="font-size:11px; color:#666; margin-top:5px;">專案名稱：${curProjName}</div>`;
        container.appendChild(hdr);

        const tableClone = table.cloneNode(true);
        tableClone.style.width = '100%';
        container.appendChild(tableClone);

        // 右下角日期
        const ftr = document.createElement('div');
        ftr.style.cssText = 'text-align:right; font-size:10px; color:#888; margin-top:15px;';
        ftr.textContent = `列印日期：${new Date().toLocaleDateString('zh-TW')}`;
        container.appendChild(ftr);

        document.body.appendChild(container);
        const canvas = await html2canvas(container, { scale: 2 });
        document.body.removeChild(container);

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');
        const imgW = 297 - 20;
        const imgH = (canvas.height * imgW) / canvas.width;
        pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 10, 10, imgW, imgH);
        pdf.save(`${titleText}.pdf`);
    } catch(e) {
        alert("匯出失敗");
    }
    btn.textContent = '📄 匯出 PDF';
    btn.disabled = false;
}

// ═══════════ 初始化與輔助 ═══════════
function loadScript(src){
    return new Promise(res => {
        if(document.querySelector(`script[src="${src}"]`)) return res();
        const s = document.createElement('script'); s.src = src; s.onload = res; document.head.appendChild(s);
    });
}

function chgYear(d){ curYear += d; document.getElementById('yrNum').textContent = curYear; save(); genGantt(); }

function togP(id){ 
    const p = projects.find(x=>x.id===id); 
    if(p) p.checked = !p.checked; 
    save(); renderSB(); 
}

function renderSB() {
    document.getElementById('sbList').innerHTML = projects.map(p => `
        <div class="pitem ${p.checked?'active':''}" onclick="togP(${p.id})">
            <input type="checkbox" ${p.checked?'checked':''}>
            <div style="flex:1; margin-left:8px;">
                <div style="font-size:11px; font-weight:bold;">${p.name}</div>
                <div style="font-size:9px; color:#888;">${p.cat || '未分類'}</div>
            </div>
        </div>
    `).join('');
}

function discAgree() { 
    sessionStorage.setItem('disc','ok'); 
    document.getElementById('discBg').classList.remove('open'); 
}

function discDecline() { window.location.href='https://www.google.com'; }

// 啟動
window.onload = function() {
    if(!sessionStorage.getItem('disc')) document.getElementById('discBg').classList.add('open');
    document.getElementById('yrNum').textContent = curYear;
    renderProjSelect();
    renderSB();
    genGantt();
};

function openModal() {
    const n = prompt("輸入計畫名稱");
    if(!n) return;
    projects.push({id: nid++, name: n, checked:true, months:[1,2], color:0, prog:{}});
    save(); renderSB(); genGantt();
}
</script>
</body>
</html>
